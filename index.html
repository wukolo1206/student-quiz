<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>學扶數學診斷測驗</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft JhengHei","微軟正黑體",sans-serif;background:#f5f8fc;color:#333;min-height:100vh}
.container{max-width:680px;margin:0 auto;padding:16px}
h1{color:#1a4f7a;font-size:20px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #d6eaf8}
h2{font-size:16px;color:#1a4f7a;margin-bottom:12px}
.form-group{margin-bottom:16px}
label.form-label{display:block;font-size:13px;color:#555;margin-bottom:6px;font-weight:bold}
input[type=text],input[type=email]{width:100%;padding:10px 12px;border:1px solid #cdd;border-radius:8px;font-size:14px;font-family:inherit}
input[type=number]{width:80px;padding:8px 10px;border:1px solid #cdd;border-radius:8px;font-size:14px}
.indicator-list{max-height:260px;overflow-y:auto;border:1px solid #cdd;border-radius:0 0 8px 8px;background:white}
.ind-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #edf0f5;cursor:pointer;user-select:none}
.ind-item:last-child{border-bottom:none}
.ind-item:hover{background:#f0f7ff}
.ind-item input[type=checkbox]{width:16px;height:16px;cursor:pointer;flex-shrink:0}
.ind-id{font-family:monospace;font-size:12px;color:#2980b9;min-width:95px}
.ind-name{font-size:13px;flex:1}
.ind-cnt{font-size:11px;color:#aaa;white-space:nowrap}
.grade-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.grade-chip{padding:5px 13px;border:1px solid #cdd;border-radius:20px;font-size:12px;cursor:pointer;background:white;font-family:inherit;color:#555;transition:all .15s}
.grade-chip:hover{border-color:#1a4f7a;color:#1a4f7a}
.grade-chip.active{background:#1a4f7a;color:white;border-color:#1a4f7a}
.search-box{width:100%;padding:8px 12px;border:1px solid #cdd;border-bottom:none;border-radius:8px 8px 0 0;font-size:13px;font-family:inherit}
.btn{display:inline-block;padding:12px 20px;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;font-family:inherit;text-decoration:none;text-align:center}
.btn-primary{background:#1a4f7a;color:white;width:100%;display:block}
.btn-primary:disabled{background:#aaa;cursor:not-allowed}
.btn-primary:not(:disabled):hover{background:#144060}
.btn-orange{background:#e67e22;color:white}
.btn-copy{background:white;color:#555;border:1px solid #cdd;font-size:13px;padding:8px 14px}
.radio-row{display:flex;gap:14px;flex-wrap:wrap}
.radio-item{display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer}
.share-row{display:flex;gap:8px;margin-top:8px}
.share-row input{flex:1;font-size:12px;background:#f8f8f8;color:#555;padding:8px 10px;border:1px solid #ddd;border-radius:6px}
.hint{font-size:11px;color:#aaa;margin-top:4px}
.progress-bar{background:#edf0f5;border-radius:10px;height:8px;margin-bottom:8px}
.progress-fill{background:#1a4f7a;border-radius:10px;height:8px;transition:width .3s}
.progress-text{font-size:12px;color:#888;text-align:right;margin-bottom:14px}
.ind-badge{display:inline-block;background:#edf5ff;color:#1a4f7a;font-size:11px;padding:3px 10px;border-radius:10px;margin-bottom:10px;font-family:monospace}
.img-wrap{text-align:center;margin-bottom:18px;min-height:100px;display:flex;align-items:center;justify-content:center}
.img-wrap img{max-width:100%;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.img-err{color:#c00;font-size:14px;padding:20px;display:none}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ans-btn{padding:14px 10px;border:2px solid #cdd;border-radius:10px;background:white;font-size:15px;font-weight:bold;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.ans-btn:hover{border-color:#1a4f7a;background:#f0f7ff}
.ans-btn.sel{border-color:#1a4f7a;background:#1a4f7a;color:white}
.card{background:white;border-radius:12px;padding:16px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:bold;margin-bottom:8px}
.badge-ok{background:#d5f5e3;color:#196f3d}
.badge-mid{background:#fef9e7;color:#9a7d0a}
.badge-bad{background:#fdebd0;color:#a04000}
.big-score{font-size:32px;font-weight:bold;color:#1a4f7a}
.wrong-list{margin-top:12px}
.wrong-item{border:1px solid #fad7d7;border-radius:8px;overflow:hidden;margin-bottom:10px}
.wrong-hdr{background:#fdf2f2;padding:8px 12px;font-size:12px;color:#c00}
.wrong-img img{max-width:100%;display:block}
.wrong-ans{padding:8px 12px;font-size:12px;color:#555;background:#fffafa}
.parents-note{font-size:12px;color:#888;margin-top:8px;padding:8px 10px;background:#f0f7ff;border-radius:6px;border-left:3px solid #1a4f7a}
.parent-chips{margin-top:6px;display:flex;flex-direction:column;gap:5px}
.parent-chip-row{display:flex;align-items:center;gap:8px;background:white;border-radius:6px;padding:6px 10px}
.parent-pid{font-family:monospace;font-size:11px;color:#2980b9;white-space:nowrap;min-width:80px}
.parent-pname{font-size:12px;flex:1;color:#333}
.btn-practice{white-space:nowrap;padding:4px 12px;background:#1a4f7a;color:white;border-radius:6px;font-size:12px;text-decoration:none;font-weight:bold}
.btn-practice:hover{background:#144060}
.result-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.result-actions .btn{flex:1;min-width:140px;padding:12px}
.loading{text-align:center;padding:40px;color:#888}
.err-box{background:#fde8e8;border:1px solid #f5c6c6;border-radius:8px;padding:14px;color:#c00;margin-bottom:16px}
.map-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
@media(max-width:420px){.map-grid{grid-template-columns:1fr}}
.map-card{background:white;border-radius:10px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #ccc}
.map-card.ok{border-left-color:#27ae60}
.map-card.mid{border-left-color:#f39c12}
.map-card.bad{border-left-color:#e74c3c}
.map-id{font-family:monospace;font-size:11px;color:#2980b9}
.map-name{font-size:12px;font-weight:bold;color:#333;margin:3px 0 5px;line-height:1.4}
.map-score{font-size:22px;font-weight:bold}
.map-score.ok{color:#27ae60}
.map-score.mid{color:#f39c12}
.map-score.bad{color:#e74c3c}
.map-meta{font-size:10px;color:#aaa;margin-top:2px}
.map-again{display:block;margin-top:8px;text-align:center;padding:5px;background:#f0f7ff;color:#1a4f7a;border-radius:6px;font-size:12px;text-decoration:none;font-weight:bold}
.map-again:hover{background:#d6eaf8}
.map-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.map-nav h1{margin:0;border:none;padding:0}
.map-back{background:none;border:none;font-size:20px;cursor:pointer;color:#1a4f7a;padding:4px}
.map-actions{display:flex;gap:6px;margin-top:8px}
.map-actions a,.map-actions button{flex:1;display:block;text-align:center;padding:5px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:bold;text-decoration:none}
.map-actions .map-again{margin-top:0;background:#f0f7ff;color:#1a4f7a}
.map-actions .map-again:hover{background:#d6eaf8}
.map-hierarchy{background:#fff7e6;color:#b35c00}
.map-hierarchy:hover{background:#ffe8bf}
.map-focus-back{display:none;margin-bottom:10px;background:none;border:none;color:#1a4f7a;cursor:pointer;font-family:inherit;font-size:13px}
.map-axis{display:none;flex-direction:column;align-items:flex-start;font-size:11px;margin:4px 2px 10px;line-height:1.6}
.map-axis span{display:block}
.map-axis .ax-top{color:#1a4f7a}
.map-axis .ax-mid{color:#b35c00;font-weight:bold}
.map-axis .ax-bot{color:#666}
</style>
</head>
<body>
<div class="container">

<div id="v-config">
  <h1>📝 學扶數學診斷測驗</h1>
  <div class="form-group">
    <label class="form-label" for="i-sid">座號</label>
    <input type="text" id="i-sid" placeholder="請輸入座號" maxlength="10">
  </div>
  <div class="form-group">
    <label class="form-label" for="i-name">姓名</label>
    <input type="text" id="i-name" placeholder="請輸入姓名">
  </div>
  <div id="settings-block">
    <div class="form-group">
      <label class="form-label">選擇指標（可複選）</label>
      <div class="grade-filter" id="grade-filter">
        <button class="grade-chip active" data-g="0" onclick="setGrade(0)">全部年級</button>
        <button class="grade-chip" data-g="2" onclick="setGrade(2)">2 年級</button>
        <button class="grade-chip" data-g="3" onclick="setGrade(3)">3 年級</button>
        <button class="grade-chip" data-g="4" onclick="setGrade(4)">4 年級</button>
        <button class="grade-chip" data-g="5" onclick="setGrade(5)">5 年級</button>
        <button class="grade-chip" data-g="6" onclick="setGrade(6)">6 年級</button>
      </div>
      <input class="search-box" id="ind-search" placeholder="搜尋指標代碼或名稱…" oninput="renderIndList()">
      <div class="indicator-list" id="ind-list"><div class="loading">載入中…</div></div>
    </div>
    <div class="form-group">
      <label class="form-label">題數</label>
      <div class="radio-row">
        <label class="radio-item"><input type="radio" name="cnt" value="all" checked onchange="toggleCntInput()"> 全部題目</label>
        <label class="radio-item"><input type="radio" name="cnt" value="custom" onchange="toggleCntInput()"> 指定
          <input type="number" id="i-cnt" value="5" min="1" max="50" style="display:none">
          <span id="cnt-sfx" style="display:none;font-size:13px">題</span>
        </label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">出題順序</label>
      <div class="radio-row">
        <label class="radio-item"><input type="radio" name="ord" value="random" checked> 隨機</label>
        <label class="radio-item"><input type="radio" name="ord" value="sequential"> 依年份順序（由舊到新）</label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" for="i-email">老師 Email（選填，結果頁寄信用）</label>
      <input type="email" id="i-email" placeholder="teacher@school.edu.tw" oninput="updateShareUrl()">
    </div>
    <div class="form-group">
      <label class="form-label" for="i-sheet">紀錄試算表 ID（選填，自動寫入 Google Sheets）</label>
      <input type="text" id="i-sheet" placeholder="貼上 Google Sheet ID（網址 /d/ 後面那段）" oninput="updateShareUrl()">
      <div class="hint">📌 填入後學生作答結果會自動寫入你的試算表。<a href="https://docs.google.com/spreadsheets/d/1LrbPaMzdpNNEBXNRZODVNffd-2e7psDcvW9dlTYKMDk/copy" target="_blank" style="color:#1a4f7a">點此複製模板</a>，複製後將試算表分享給 wukolo1206@gmail.com（可編輯），再把 Sheet ID 貼到上方欄位。</div>
    </div>
    <div class="share-row">
      <input type="text" id="share-url" readonly placeholder="選好指標後，點此複製分享連結給學生">
      <button class="btn btn-copy" onclick="copyShareUrl()">📋 複製連結</button>
    </div>
    <div class="hint">複製後發給學生，學生點開即進入你設定好的測驗</div>
  </div>
  <div style="margin-top:20px">
    <button class="btn btn-primary" id="btn-start" onclick="startQuiz()" disabled>開始測驗</button>
  </div>
</div>

<div id="v-quiz" style="display:none">
  <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
  <div class="progress-text" id="prog-txt"></div>
  <div class="ind-badge" id="quiz-badge"></div>
  <div class="img-wrap">
    <img id="q-img" src="" alt="題目" onerror="imgError()">
    <div class="img-err" id="img-err">⚠️ 圖片無法載入，請檢查網路連線</div>
  </div>
  <div class="ans-grid" id="ans-grid">
    <button class="ans-btn" onclick="pick(1)">① 選項一</button>
    <button class="ans-btn" onclick="pick(2)">② 選項二</button>
    <button class="ans-btn" onclick="pick(3)">③ 選項三</button>
    <button class="ans-btn" onclick="pick(4)">④ 選項四</button>
  </div>
</div>

<div id="v-result" style="display:none">
  <h1>📊 診斷結果</h1>
  <div id="result-body"></div>
</div>

<div id="v-map" style="display:none">
  <div class="map-nav">
    <button class="map-back" onclick="showView('result')" title="返回結果">←</button>
    <h1 id="map-title">學習地圖</h1>
  </div>
  <button id="map-focus-back" class="map-focus-back" onclick="closeHierarchy()">← 返回全部學習紀錄</button>
  <div id="map-axis" class="map-axis">
    <span class="ax-top">↑ 上層：前置能力</span>
    <span class="ax-mid">● 中層：目前能力</span>
    <span class="ax-bot">↓ 下層：後續能力</span>
  </div>
  <div class="grade-filter" id="map-grade-filter">
    <button class="grade-chip active" data-g="0" onclick="setMapGrade(0)">全部年級</button>
    <button class="grade-chip" data-g="2" onclick="setMapGrade(2)">2 年級</button>
    <button class="grade-chip" data-g="3" onclick="setMapGrade(3)">3 年級</button>
    <button class="grade-chip" data-g="4" onclick="setMapGrade(4)">4 年級</button>
    <button class="grade-chip" data-g="5" onclick="setMapGrade(5)">5 年級</button>
    <button class="grade-chip" data-g="6" onclick="setMapGrade(6)">6 年級</button>
  </div>
  <div id="map-hint" style="font-size:11px;color:#999;text-align:center;margin:6px 0 8px">選擇特定年級可查看概念關係地圖</div>
  <div id="map-info" class="card" style="display:none;padding:12px 16px;margin-bottom:10px"></div>
  <div id="map-network" style="height:360px;border:1px solid #dde8f0;border-radius:10px;background:white;margin-bottom:8px;display:none"></div>
  <div id="map-legend" style="display:none;font-size:11px;color:#888;gap:12px;flex-wrap:wrap;margin-bottom:10px;justify-content:center">
    <span style="color:#27ae60">● 掌握 ≥80%</span>
    <span style="color:#f39c12">● 部分掌握</span>
    <span style="color:#e74c3c">● 需補強</span>
    <span style="color:#aaa">● 未練習</span>
  </div>
  <div id="map-body"></div>
</div>

</div>

<script src="map_hierarchy_logic.js" onerror="window.__mapLogicFailed=true"></script>
<script>
var S={data:null,cfg:{inds:[],count:0,order:'random',to:'',name:'',sid:'',sheet:''},qs:[],idx:0,ans:{},locked:false,gradeFilter:0,mapGradeFilter:0,mapFocusId:''};
var GAS_URL='https:/'+ '/script.google.com/macros/s/AKfycby1XbfGkfnOy-mXHreGsRy9kmQ-gHX4ptsmNK0rR0ts-f-I9Hbb2bgvJGI6d8Qo9WdD/exec';
window.onload=function(){
  fetch('./quiz_data.json?t='+Date.now())
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){
      S.data=d;
      var p=new URLSearchParams(location.search);
      var pName=decodeURIComponent(p.get('name')||'');
      var pSid=decodeURIComponent(p.get('sid')||'');
      if(pName)document.getElementById('i-name').value=pName;
      if(pSid)document.getElementById('i-sid').value=pSid;
      var pInds=p.get('indicators');
      if(pInds){
        var ids=pInds.split(',').filter(function(id){return d.indicators[id]&&d.indicators[id].questions&&d.indicators[id].questions.length;});
        if(ids.length>0){
          S.cfg.inds=ids;
          S.cfg.count=p.get('count')==='all'?0:(parseInt(p.get('count'))||0);
          S.cfg.order=p.get('order')||'random';
          S.cfg.to=decodeURIComponent(p.get('to')||'');
          S.cfg.sheet=p.get('sheet')||'';
          S.locked=true;
          document.getElementById('settings-block').style.display='none';
          document.getElementById('btn-start').disabled=false;
          return;
        }
      }
      renderIndList();
    })
    .catch(function(e){
      document.getElementById('ind-list').innerHTML='<div class="err-box">載入題庫失敗：'+e.message+'<br>如為本地測試，請用 python -m http.server 8080 啟動</div>';
    });
};
function setGrade(g){
  S.gradeFilter=g;
  document.querySelectorAll('#grade-filter .grade-chip').forEach(function(c){
    c.classList.toggle('active', parseInt(c.getAttribute('data-g'))===g);
  });
  renderIndList();
}
function setMapGrade(g){
  S.mapGradeFilter=g;
  document.querySelectorAll('#map-grade-filter .grade-chip').forEach(function(c){
    c.classList.toggle('active', parseInt(c.getAttribute('data-g'))===g);
  });
  renderMap();
}
function renderIndList(){
  if(!S.data)return;
  var q=(document.getElementById('ind-search').value||'').toLowerCase();
  var html='';
  Object.keys(S.data.indicators).sort().forEach(function(id){
    var ind=S.data.indicators[id];
    if(!ind.questions||!ind.questions.length)return;   // skeleton 不進派題選單
    if(S.gradeFilter&&ind.grade!==S.gradeFilter)return;
    if(q&&id.toLowerCase().indexOf(q)<0&&ind.name.toLowerCase().indexOf(q)<0)return;
    var ck=S.cfg.inds.indexOf(id)>=0;
    html+='<label class="ind-item"><input type="checkbox" value="'+id+'" '+(ck?'checked':'')+' onchange="toggleInd(this)">'
         +'<span class="ind-id">'+id+'</span>'
         +'<span class="ind-name">'+ind.name+'</span>'
         +'<span class="ind-cnt">'+ind.questions.length+' 題</span></label>';
  });
  document.getElementById('ind-list').innerHTML=html||'<div style="padding:14px;color:#aaa;font-size:13px">無符合條件的指標</div>';
}
function toggleInd(cb){
  var id=cb.value,idx=S.cfg.inds.indexOf(id);
  if(cb.checked&&idx<0)S.cfg.inds.push(id);
  if(!cb.checked&&idx>=0)S.cfg.inds.splice(idx,1);
  document.getElementById('btn-start').disabled=S.cfg.inds.length===0;
  updateShareUrl();
}
function toggleCntInput(){
  var custom=document.querySelector('[name=cnt]:checked').value==='custom';
  document.getElementById('i-cnt').style.display=custom?'':'none';
  document.getElementById('cnt-sfx').style.display=custom?'':'none';
  updateShareUrl();
}
function updateShareUrl(){
  if(!S.data||S.cfg.inds.length===0){document.getElementById('share-url').value='';return;}
  var base=location.origin+location.pathname;
  var cntType=document.querySelector('[name=cnt]:checked');
  var cnt=(cntType&&cntType.value==='custom')?(document.getElementById('i-cnt').value||5):'all';
  var ord=document.querySelector('[name=ord]:checked');
  var to=document.getElementById('i-email').value.trim();
  var sheet=document.getElementById('i-sheet').value.trim();
  var url=base+'?indicators='+S.cfg.inds.join(',')+'&count='+cnt+'&order='+(ord?ord.value:'random')+(to?'&to='+encodeURIComponent(to):'')+(sheet?'&sheet='+encodeURIComponent(sheet):'');
  document.getElementById('share-url').value=url;
}
function copyShareUrl(){
  var url=document.getElementById('share-url').value;
  if(!url){alert('請先選擇至少一個指標');return;}
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){alert('分享連結已複製！');});}
  else{document.getElementById('share-url').select();document.execCommand('copy');alert('分享連結已複製！');}
}
function startQuiz(){
  S.cfg.name=document.getElementById('i-name').value.trim();
  S.cfg.sid=document.getElementById('i-sid').value.trim();
  if(!S.cfg.name){alert('請填入姓名');return;}
  if(!S.locked){
    var cntType=document.querySelector('[name=cnt]:checked');
    S.cfg.count=(cntType&&cntType.value==='custom')?(parseInt(document.getElementById('i-cnt').value)||5):0;
    var ord=document.querySelector('[name=ord]:checked');
    S.cfg.order=ord?ord.value:'random';
    S.cfg.to=document.getElementById('i-email').value.trim();
    S.cfg.sheet=document.getElementById('i-sheet').value.trim();
  }
  buildQs();
  if(S.qs.length===0){alert('所選指標目前無可診斷的題目（需有截圖且有答案）');return;}
  S.idx=0;S.ans={};
  showView('quiz');
  renderQ();
}
function buildQs(){
  var pool=[];
  S.cfg.inds.forEach(function(id){
    var ind=S.data.indicators[id];
    if(!ind)return;
    ind.questions.forEach(function(q){
      pool.push({id:id,name:ind.name,year:q.year,no:q.no,grade:q.grade,imageUrl:q.imageUrl,answer:q.answer});
    });
  });
  if(S.cfg.order==='random'){
    for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  }
  S.qs=S.cfg.count>0?pool.slice(0,S.cfg.count):pool;
}

function calcByInd(){
  var r={};
  S.cfg.inds.forEach(function(id){r[id]={correct:0,total:0,wrongs:[]};});
  S.qs.forEach(function(q){
    var key=q.id+'_'+q.year+'_'+q.no;
    var stu=S.ans[key]||0;
    var ok=parseInt(atob(q.answer));
    if(!r[q.id])r[q.id]={correct:0,total:0,wrongs:[]};
    r[q.id].total++;
    if(stu>0&&stu===ok){r[q.id].correct++;}
    else{r[q.id].wrongs.push({q:q,stu:stu,ok:ok});}
  });
  return r;
}
function masteryInfo(pct){
  if(pct>=80)return{text:'✅ 掌握',cls:'badge-ok'};
  if(pct>=50)return{text:'⚠️ 部分掌握',cls:'badge-mid'};
  return{text:'❌ 需補強',cls:'badge-bad'};
}

function buildMailto(byInd){
  var nm=(S.cfg.sid?S.cfg.sid+' ':'')+S.cfg.name;
  var indNames=S.cfg.inds.filter(function(id){return byInd[id]&&byInd[id].total>0;}).map(function(id){return S.data.indicators[id].name;});
  var subj=encodeURIComponent('[學扶診斷] '+nm+' — '+indNames.join('、'));
  var lines=[nm,''];
  S.cfg.inds.forEach(function(id){
    var r=byInd[id];
    if(!r||r.total===0)return;
    var p=Math.round(r.correct/r.total*100);
    var label=p>=80?'掌握':p>=50?'部分掌握':'需補強';
    lines.push(id+'　'+S.data.indicators[id].name);
    lines.push('答對 '+r.correct+'/'+r.total+' 題（'+p+'%）— '+label);
    if(r.wrongs.length>0){lines.push('答錯：'+r.wrongs.map(function(w){return w.q.year+' 第'+w.q.no+'題（答案:'+w.ok+'）';}).join('、'));}
    lines.push('');
  });
  return 'mailto:'+encodeURIComponent(S.cfg.to)+'?subject='+subj+'&body='+encodeURIComponent(lines.join('\n'));
}

function postToSheet(byInd){
  if(!S.cfg.sheet)return;
  var today=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});
  var results=[];
  S.cfg.inds.forEach(function(id){
    var r=byInd[id];
    if(!r||r.total===0)return;
    var ind=S.data.indicators[id];
    results.push({id:id,name:ind.name,correct:r.correct,total:r.total,pct:Math.round(r.correct/r.total*100),grade:ind.grade||''});
  });
  var payload=JSON.stringify({date:today,to:S.cfg.to,sid:S.cfg.sid,name:S.cfg.name,results:results});
  fetch(GAS_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:'sheetId='+encodeURIComponent(S.cfg.sheet)+'&payload='+encodeURIComponent(payload)
  }).catch(function(){});

function saveToMap(byInd){
  if(!S.cfg.name)return;
  var key='sqmap_'+(S.cfg.sid||'')+'_'+S.cfg.name;
  var stored=localStorage.getItem(key);
  var map=stored?JSON.parse(stored):{sid:S.cfg.sid,name:S.cfg.name,records:{}};
  var today=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});
  S.cfg.inds.forEach(function(id){
    var r=byInd[id];
    if(!r||r.total===0)return;
    var ind=S.data.indicators[id];
    var pct=Math.round(r.correct/r.total*100);
    if(!map.records[id])map.records[id]={name:ind.name,grade:ind.grade,sessions:[],best:0,latest:0};
    var rec=map.records[id];
    rec.sessions.push({date:today,correct:r.correct,total:r.total,pct:pct});
    rec.best=Math.max(rec.best,pct);
    rec.latest=pct;
  });
  localStorage.setItem(key,JSON.stringify(map));
}

function _safeLoadMap(key){
  try{
    var s=localStorage.getItem(key);
    if(!s)return {records:{}};
    var o=JSON.parse(s);
    if(!o||typeof o!=='object')return {records:{}};
    if(!o.records||typeof o.records!=='object')o.records={};
    return o;
  }catch(e){
    return {records:{}};   // JSON 損毀 → 視為空紀錄，不白屏
  }
}

function renderFocusedHierarchy(map,rootId){
  var body=document.getElementById('map-body');
  // 依賴防護：模組或 vis-network 未就緒 → 錯誤卡，不卡載入中
  if(window.__mapLogicFailed||typeof MapHierarchy==='undefined'||!MapHierarchy.buildDirectHierarchy){
    document.getElementById('map-network').style.display='none';
    document.getElementById('map-legend').style.display='none';
    body.innerHTML='<div class="err-box">能力階層模組載入失敗，請重新整理頁面</div>';
    return;
  }
  if(window.__visFailed||typeof vis==='undefined'){
    document.getElementById('map-network').style.display='none';
    document.getElementById('map-legend').style.display='none';
    body.innerHTML='<div class="err-box">關係圖載入失敗，請重新整理</div>';
    return;
  }
  var model=MapHierarchy.buildDirectHierarchy(S.data.indicators,rootId,map.records||{});
  if(!model){
    document.getElementById('map-network').style.display='none';
    document.getElementById('map-legend').style.display='none';
    body.innerHTML='<div class="err-box">找不到這個能力節點</div>';
    return;
  }
  document.getElementById('map-axis').style.display='flex';
  var all=model.parents.concat([model.root],model.children);
  var colors={
    ok:{bg:'#d5f5e3',border:'#27ae60'},
    mid:{bg:'#fef9e7',border:'#f39c12'},
    bad:{bg:'#fdebd0',border:'#e74c3c'},
    unseen:{bg:'#f0f0f0',border:'#bbb'}
  };
  var nodes=all.map(function(n){
    var c=colors[n.state];
    var label=n.id+(n.latest===null?'':'\n'+n.latest+'%');
    return {
      id:n.id,label:label,
      title:n.missing?(n.id+'：能力資料尚未收錄'):(n.name+(n.hasQuestions?'':'（暫無題目）')),
      level:n.id===rootId?1:(model.parents.some(function(p){return p.id===n.id;})?0:2),
      color:{background:c.bg,border:n.id===rootId?'#f39c12':c.border,highlight:{background:c.bg,border:'#1a4f7a'}},
      borderWidth:n.id===rootId?4:(n.latest===null?1:2),
      shapeProperties:n.hasQuestions?{borderDashes:false}:{borderDashes:[4,4]},
      font:{size:11,color:n.hasQuestions?'#333':'#888'},shape:'box',margin:8
    };
  });
  var edges=[];
  model.parents.forEach(function(n){edges.push({from:n.id,to:rootId,arrows:'to',color:{color:'#ccc'}});});
  model.children.forEach(function(n){edges.push({from:rootId,to:n.id,arrows:'to',color:{color:'#ccc'}});});

  var container=document.getElementById('map-network');
  container.style.display='block';
  container.style.height='360px';
  body.innerHTML='';
  document.getElementById('map-legend').style.display='flex';
  if(_visNet){_visNet.destroy();_visNet=null;}
  _visNet=new vis.Network(container,
    {nodes:new vis.DataSet(nodes),edges:new vis.DataSet(edges)},
    {layout:{hierarchical:{enabled:true,direction:'UD',sortMethod:'directed',levelSeparation:100,nodeSpacing:150}},
     physics:false,interaction:{hover:true,tooltipDelay:200,zoomView:true,dragView:true},
     edges:{smooth:{type:'cubicBezier',forceDirection:'vertical'},arrows:{to:{scaleFactor:0.6}}}});
  _visNet.once('afterDrawing',function(){_visNet.fit({animation:{duration:300}});});
  _visNet.on('click',function(p){if(p.nodes.length)showMapNodeInfo(p.nodes[0],map);});
  showMapNodeInfo(rootId,map);
}

function renderMapNetwork(map,grade){
  var recs=map.records||{};
  var allIds=Object.keys(S.data.indicators).filter(function(id){return S.data.indicators[id].grade===grade;});
  var idSet={};allIds.forEach(function(id){idSet[id]=1;});

  // 只顯示：練過的節點 + 它們的直接先備(parents) + 直接後繼(children)
  var visible={};
  allIds.forEach(function(id){
    if(recs[id]){
      visible[id]=1;
      // 加入直接先備
      var ind=S.data.indicators[id];
      if(ind.parents)ind.parents.forEach(function(pid){if(idSet[pid])visible[pid]=1;});
      // 加入直接後繼
      allIds.forEach(function(cid){
        var ci=S.data.indicators[cid];
        if(ci.parents&&ci.parents.indexOf(id)>=0)visible[cid]=1;
      });
    }
  });
  // 若無紀錄則顯示全部（避免空圖）
  if(Object.keys(visible).length===0)allIds.forEach(function(id){visible[id]=1;});

  var visIds=Object.keys(visible);
  var nodes=visIds.map(function(id){
    var ind=S.data.indicators[id];
    var rec=recs[id];
    var bg,border;
    if(!rec){bg='#f0f0f0';border='#bbb';}
    else if(rec.latest>=80){bg='#d5f5e3';border='#27ae60';}
    else if(rec.latest>=50){bg='#fef9e7';border='#f39c12';}
    else{bg='#fdebd0';border='#e74c3c';}
    var label=id+(rec?'\n'+rec.latest+'%':'');
    return{id:id,label:label,title:ind.name+(rec?'\n最近:'+rec.latest+'% 最高:'+rec.best+'%':'\n未練習'),
      color:{background:bg,border:border,highlight:{background:bg,border:'#1a4f7a'}},
      font:{size:11,multi:false},shape:'box',margin:6,borderWidth:rec?2:1};
  });
  var edges=[];
  visIds.forEach(function(id){
    var ind=S.data.indicators[id];
    if(ind.parents)ind.parents.forEach(function(pid){
      if(visible[pid])edges.push({from:pid,to:id,arrows:'to',color:{color:'#ccc'},width:1});
    });
  });

  var container=document.getElementById('map-network');
  container.style.display='block';
  container.style.height='420px';
  document.getElementById('map-legend').style.display='flex';
  document.getElementById('map-body').innerHTML='';
  if(_visNet){_visNet.destroy();_visNet=null;}
  _visNet=new vis.Network(container,
    {nodes:new vis.DataSet(nodes),edges:new vis.DataSet(edges)},
    {layout:{hierarchical:{enabled:true,direction:'UD',sortMethod:'directed',levelSeparation:90,nodeSpacing:140,treeSpacing:180}},
     physics:false,
     interaction:{hover:true,tooltipDelay:200,zoomView:true,dragView:true},
     edges:{smooth:{type:'cubicBezier',forceDirection:'vertical'},color:{color:'#ccc'},arrows:{to:{scaleFactor:0.6}}}}
  );
  _visNet.once('afterDrawing',function(){_visNet.fit({animation:{duration:400,easingFunction:'easeInOutQuad'}});});
  _visNet.on('click',function(p){
    if(p.nodes.length>0)showMapNodeInfo(p.nodes[0],map);
  });
}

  S.mapFocusId='';
  document.querySelectorAll('#map-grade-filter .grade-chip').forEach(function(c){
    c.classList.toggle('active',c.getAttribute('data-g')==='0');
  });
  document.getElementById('map-grade-filter').style.display='flex';
  document.getElementById('map-focus-back').style.display='none';
  document.getElementById('map-axis').style.display='none';
  document.getElementById('map-title').textContent='學習地圖 — '+S.cfg.name;
  showView('map');
  if(!window.vis){
    document.getElementById('map-body').innerHTML='<div class="loading">地圖載入中…</div>';
    var s=document.createElement('script');
    s.src='https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js';
    s.onload=function(){renderMap();};
    s.onerror=function(){
      window.__visFailed=true;
      document.getElementById('map-body').innerHTML='<div class="err-box">關係圖載入失敗，請重新整理</div>';
    };
    document.head.appendChild(s);
  } else {
    renderMap();
  }
}
</script>
</body>
</html>
